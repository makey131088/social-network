<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{url_for('static', filename='node_modules/bootstrap/dist/css/bootstrap.min.css')}}">
    <link rel="stylesheet" href="{{ url_for('static', filename='master.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-6 offset-3">
                <form method="post" action="/registration" class="m-3 p-3 border rounded shadow">
                    <h2 class="text-center">Sign Up</h2>
                    <div class="row mt-3">
                        <div class="col-2">
                            <label for="email" class="form-label">Email:</label>
                        </div>
                        <div class="col-10">
                            <input type="email" name="email" id="email" class="form-control">
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-2">
                            <label for="login" class="form-label">Login:</label>
                        </div>
                        <div class="col-10">
                            <input type="text" name="login" id="login" class="form-control">
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-2">
                            <label for="password" class="form-label">Password:</label>
                        </div>
                        <div class="col-10">
                            <input type="password" name="password" id="password" class="form-control">
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-2">
                            <label for="confirm_password" class="form-label">Confirm Password:</label>
                        </div>
                        <div class="col-10">
                            <input type="password" name="confirm_password" id="confirm_password" class="form-control">
                        </div>
                    </div>
                    <div class="d-grid mt-3">
                        <button class="btn btn-primary">Login</button>
                    </div>
                    <div class="row mt-3">
                        <div class="col-12 text-end">
                            Already have an account? <a href="/login">Sing In</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='registration.js') }}"></script>
</body>

</html>
